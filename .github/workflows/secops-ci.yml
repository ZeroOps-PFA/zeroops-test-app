name: SecOps Cloud Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read
      packages: write
      id-token: write  

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@aa494459d7c39c106cbe2eae096ef87bc7e9d51a  
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=zeroops-pfa
            -Dsonar.projectKey=zeroops_pfa_zeroops_test_app
            -Dsonar.host.url=https://sonarcloud.io

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e53bc471838  
        with:
          scan-type: 'fs'
          format:    'table'
          severity:  'CRITICAL,HIGH'
          exit-code: '1'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991  
        with:
          context: .
          push: true
          tags: ghcr.io/zeroops-pfa/zeroops-test-app:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
